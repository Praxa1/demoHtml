<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kaan loves Regina</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 900px;
      width: 100%;
    }

    .line {
      display: block;
      color: #f0ebe4;
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 400;
      line-height: 1.8;
    }

    #kaanLine {
      opacity: 0;
      animation: fadeIn 0.6s ease 0.2s forwards;
    }

    #soLine {
      font-style: italic;
      color: #c8a97e;
      font-size: clamp(2rem, 6vw, 3.8rem);
      word-break: break-all;
      line-height: 1.4;
      opacity: 1;
      min-height: 1.4em;
    }

    #muchLine {
      opacity: 0;
      display: inline-block;
      transform: scale(0.2);
      color: #f0ebe4;
    }

    .much-pop {
      animation: popOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.6) forwards !important;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes popOut {
      0%   { opacity: 0; transform: scale(0.2); }
      60%  { transform: scale(1.25); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
<div class="container">
  <span class="line" id="kaanLine">Kaan loves Regina</span>
  <span class="line" id="soLine"></span>
  <span class="line" id="muchLine">much!</span>
</div>

<script>
  const soLine  = document.getElementById('soLine');
  const muchLine = document.getElementById('muchLine');
  const oCount  = 40;
  let i = 0;

  function addO() {
    soLine.textContent = 's' + 'o'.repeat(i);
    i++;
    if (i <= oCount) {
      setTimeout(addO, 80);
    } else {
      // "much!" pops in after a brief pause
      setTimeout(() => {
        muchLine.classList.add('much-pop');
      }, 300);
    }
  }

  setTimeout(addO, 1000);
</script>
</body>
</html>
